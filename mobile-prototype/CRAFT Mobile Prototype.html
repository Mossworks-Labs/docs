<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>CRAFT — Mobile prototype</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    background: #0a0d0c;
    font-family: "Inter Tight", system-ui, sans-serif;
    color: #e8ecea;
    overscroll-behavior: none;
  }
  *::-webkit-scrollbar { width: 6px; height: 6px; }
  *::-webkit-scrollbar-thumb { background: #2e3633; border-radius: 3px; }
  *::-webkit-scrollbar-track { background: transparent; }

  .stage {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 18px;
    padding: 18px;
    box-sizing: border-box;
  }
  @media (max-width: 900px) {
    .stage { grid-template-columns: 1fr; padding: 8px; gap: 8px; }
    .nav-rail { display: none !important; }
  }

  /* Nav rail */
  .nav-rail {
    position: sticky; top: 18px; align-self: start;
    background: #111615;
    border: 1px solid #242b29;
    border-radius: 14px;
    padding: 14px 12px;
    max-height: calc(100vh - 36px);
    overflow-y: auto;
  }
  .nav-rail h2 {
    font-family: "Instrument Serif", serif;
    font-size: 28px; font-weight: 400;
    margin: 4px 6px 2px;
    color: #e8ecea;
    letter-spacing: -0.02em;
  }
  .nav-rail .sub {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px; letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #7a847f;
    margin: 0 6px 14px;
  }
  .nav-section {
    font-family: "JetBrains Mono", monospace;
    font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
    color: #525c57;
    margin: 14px 8px 6px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px;
    font-family: "Inter Tight", sans-serif;
    font-size: 13px; color: #b8c0bc;
    cursor: pointer;
    border: 1px solid transparent;
  }
  .nav-item:hover { background: #1a201e; color: #e8ecea; }
  .nav-item.active {
    background: rgba(13,148,136,0.14);
    color: #5eead4;
    border-color: rgba(13,148,136,0.32);
  }
  .nav-item .nav-num {
    font-family: "JetBrains Mono", monospace;
    font-size: 9px; color: #525c57;
    width: 18px;
  }
  .nav-item.active .nav-num { color: #5eead4; }
  .nav-item .nav-label { flex: 1; }
  .nav-item .nav-tag {
    font-family: "JetBrains Mono", monospace;
    font-size: 9px; color: #525c57;
  }

  /* Phone stage */
  .phone-stage {
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding: 24px 18px;
    background:
      radial-gradient(ellipse at top, rgba(13,148,136,0.04), transparent 60%),
      #0a0d0c;
    border-radius: 14px;
    border: 1px solid #242b29;
    min-height: calc(100vh - 36px);
  }
  .phone-meta {
    width: 100%;
    max-width: 420px;
    display: flex; align-items: baseline; gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .phone-meta .crumb {
    font-family: "Instrument Serif", serif;
    font-size: 22px; color: #e8ecea;
    letter-spacing: -0.01em;
  }
  .phone-meta .crumb em { color: #5eead4; font-style: italic; }
  .phone-meta .meta {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px; letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #7a847f;
  }
  .phone-meta .meta strong { color: #b8c0bc; font-weight: 500; }

  .phone-shell {
    position: relative;
    border-radius: 44px;
    padding: 10px;
    background:
      linear-gradient(180deg, #1a201e 0%, #0e1212 100%);
    box-shadow:
      0 30px 80px rgba(0,0,0,0.55),
      0 0 0 1px #2e3633,
      inset 0 0 0 1px #1a201e;
  }
  .phone-screen {
    width: 412px;
    height: 892px;
    border-radius: 36px;
    overflow: hidden;
    position: relative;
    background: #0b0f0e;
    display: flex; flex-direction: column;
  }
  @media (max-width: 480px) {
    .phone-shell { padding: 6px; border-radius: 32px; }
    .phone-screen { width: 360px; height: 780px; border-radius: 28px; }
  }

  .screen-body {
    flex: 1; min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    position: relative;
  }

  .desc {
    width: 100%; max-width: 420px;
    margin-top: 18px;
    padding: 14px 16px;
    background: #111615;
    border: 1px solid #242b29;
    border-radius: 10px;
    font-family: "Inter Tight", sans-serif;
    font-size: 13px; color: #b8c0bc;
    line-height: 1.5;
  }
  .desc h3 {
    font-family: "Instrument Serif", serif;
    font-size: 20px; font-weight: 400;
    color: #e8ecea;
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }
  .desc h3 em { color: #5eead4; font-style: italic; }
  .desc p { margin: 0 0 10px; }
  .desc p:last-child { margin: 0; }
  .desc code {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    background: #1a201e;
    padding: 1px 5px;
    border-radius: 3px;
    color: #5eead4;
  }
</style>
</head>
<body>

<div class="stage">
  <!-- Nav rail (desktop) -->
  <aside class="nav-rail" id="navRail">
    <h2>craft.</h2>
    <div class="sub">Mobile · v1.0 · 16 screens</div>
    <div id="navItems"></div>
  </aside>

  <!-- Phone stage -->
  <main class="phone-stage">
    <div class="phone-meta">
      <span class="crumb" id="crumb">Home<em>.</em></span>
      <span class="meta" id="metaTag">○ flow · android · 412×892</span>
      <span class="meta" id="counter" style="margin-left:auto"></span>
    </div>

    <div class="phone-shell">
      <div class="phone-screen" id="phoneScreen">
        <div id="root" style="flex:1; display:flex; flex-direction:column; min-height:0;"></div>
      </div>
    </div>

    <div class="desc" id="desc">
      <h3>Loading…</h3>
    </div>
  </main>
</div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Tweaks panel starter -->
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- Screens -->
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="screens2.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "teal",
  "headerStyle": "serif",
  "showFrame": true,
  "showBottomNav": true,
  "showAnnotations": true,
  "background": "void"
}/*EDITMODE-END*/;

// Screen registry — order = side-rail order
const SCREENS = [
  // Onboarding
  { id: 'login',         label: 'Login',           group: 'Onboarding', desc: { t: 'Login.', em: '', body: 'Keycloak SSO via oauth2-proxy. Mobile uses WebBrowser.openAuthSessionAsync; the form mirrors values stored in EAS env vars. The deep teal gradient logomark is the only branded element on this screen — everything else is type.' } },

  // Daily flow
  { id: 'home',          label: 'Home',            group: 'Daily flow', desc: { t: 'Home — landing.', em: 'today', body: 'Stage tiles act as the four lifecycle phases (Discover → Ideas → Scripts → Episodes). The "Live now" rail uses Server-Sent Events on web; on mobile we poll <code>listJobs()</code> every 3s since RN fetch lacks ReadableStream. Channel pill is sticky vocabulary across every screen — replaces the web sidebar.' } },
  { id: 'discover',      label: 'Discover',        group: 'Daily flow', desc: { t: 'Discover.', em: 'YouTube search', body: 'Outlier slider boosts videos performing above their channel\'s baseline. Channel chips group results — tap one to see a deeper analytical view. Free / paid sources tagged inline; mobile defaults to the 14 free providers.' } },
  { id: 'channel-deep',  label: '↳ Channel deep',  group: 'Daily flow', desc: { t: 'Channel deep dive.', em: '', body: 'Estimated earnings driven by your configured RPM (Settings). The content-mix bar is a quick read on a competitor\'s posting balance; their last three uploads use the same vph metric your own pipeline reports back.' } },
  { id: 'video-deep',    label: '↳ Video deep',    group: 'Daily flow', desc: { t: 'Video deep dive.', em: '', body: 'Pulls metadata + transcript via <code>fetchTranscript()</code>; on mobile we fade the transcript at 120px and expand on tap. "Inspire idea" pipes the transcript into the AI ideas generator with this video as context.' } },
  { id: 'ideas',         label: 'Ideas',           group: 'Daily flow', desc: { t: 'Ideas.', em: 'human + AI', body: 'Three sources merge into one feed: AI-generated (<code>generateIdeas</code>), Discover-imported, and manually written. Type pill (long/short) is a hard filter on the pipeline — it determines target word count and which generation prompt fires.' } },
  { id: 'idea-detail',   label: '↳ Idea detail',   group: 'Daily flow', desc: { t: 'Idea detail.', em: '', body: 'Tap "Convert to script" to call <code>POST /scripts</code> + <code>PATCH /pipeline/research/status approved</code> in sequence — this matches the web flow, which mobile currently doesn\'t do (see Endpoint health).' } },

  // Production
  { id: 'scripts',       label: 'Scripts',         group: 'Production', desc: { t: 'Scripts.', em: '', body: 'Word-count target hard-coded by content type: 150 for shorts, 1500 for long-form. Status pills (draft / review / final) drive what tools are available in the editor — review enables fact-check & humanize.' } },
  { id: 'script-edit',   label: '↳ Script editor', group: 'Production', desc: { t: 'Script editor.', em: '', body: 'Four AI tools rail across the top: Revise, Polish, Fact-check, Humanize. Tapping Fact-check opens a bottom-sheet with verified/unverified/disputed claims linked back to inline footnotes. Auto-save every 12 seconds via <code>updateScript()</code>.' } },
  { id: 'episodes',      label: 'Episodes',        group: 'Production', desc: { t: 'Episodes.', em: '7-stage pipeline', body: 'The pipeline strip is the spine of the entire app. Each stage maps to a worker on the pipeline-service: research, script, storyboard, assets, export, review, publish. Amber = producer flagged the stage and asked for a rerun.' } },
  { id: 'episode-detail',label: '↳ Episode detail',group: 'Production', desc: { t: 'Episode detail.', em: '', body: 'Producer notes are the system\'s critique of an iteration — when a stage scores under 7/10, the next iteration runs with these notes attached. SSE on web; mobile polls <code>getJob()</code> until terminal state.' } },
  { id: 'audio-create',  label: 'Audio',           group: 'Production', desc: { t: 'Audio.', em: 'four providers', body: 'Tabs across the top swap TTS providers; Bella + ElevenLabs is the default for premium channels. SFX sections render a different prompt; music uses MusicGen and supports per-section background tracks. Per-section mic re-record (web feature) is in the Endpoint to-do list.' } },

  // Library + premium
  { id: 'resources',     label: 'Resources',       group: 'Library + premium', desc: { t: 'Resources.', em: '14 sources', body: 'Pexels, Unsplash, Wikimedia Commons, Smithsonian, NASA, Met, Pixabay, NYPL, RijksMuseum, USDA, etc. — toggleable per-search. License filters honor downstream YouTube\'s monetization rules (CC0/PD safe).' } },
  { id: 'proposals',     label: 'Proposals',       group: 'Library + premium', desc: { t: 'Proposals.', em: 'premium', body: 'Channel-scoped AI suggestions scored on three axes (relevance to your existing catalog, uniqueness in your niche, character fit). Accept → spawns an idea + script + queues research. YOLO → one-shot the entire pipeline.' } },
  { id: 'jobs',          label: 'Jobs',            group: 'Library + premium', desc: { t: 'Jobs.', em: 'live SSE', body: 'Web subscribes to <code>/api/events</code> for live progress; mobile uses <code>react-native-sse</code> (or 3s polling fallback). Failed jobs surface here before they show up on episodes — clicking one opens the worker output.' } },

  // System
  { id: 'more',          label: 'More menu',       group: 'System', desc: { t: 'More.', em: '', body: 'A flat tray of everything that didn\'t earn a permanent bottom-nav slot. Premium items are visually marked but never gated until tapped — discoverability over conversion friction.' } },
  { id: 'settings',      label: 'Settings',        group: 'System', desc: { t: 'Channel settings.', em: '', body: 'Character sheet drives every AI prompt — the AI Character Creator runs once on channel creation but can be re-run. RPM is a manual estimate; we don\'t pull from YouTube Analytics on mobile yet (would require user OAuth).' } },
  { id: 'endpoints',     label: 'Endpoints (audit)', group: 'System', desc: { t: 'Endpoint audit.', em: '', body: 'Refactor appendix — diff of <code>mobile/src/lib/api.ts</code> against current backend. Use it as the implementation checklist for v1.0. Includes pipeline-service migration mismatches and 13 endpoints to add.' } },
];

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAKS_DEFAULTS);
  const [screen, setScreen] = useState(getHashScreen() || 'home');

  useEffect(() => {
    const onHash = () => { const s = getHashScreen(); if (s) setScreen(s); };
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  const go = (id) => {
    setScreen(id);
    history.replaceState(null, '', '#' + id);
    // scroll the screen body to top
    requestAnimationFrame(() => {
      const sb = document.querySelector('.screen-body');
      if (sb) sb.scrollTop = 0;
    });
  };

  // Build nav groups
  const groups = useMemo(() => {
    const acc = {};
    SCREENS.forEach((s, i) => {
      const g = s.group || 'Other';
      if (!acc[g]) acc[g] = [];
      acc[g].push({ ...s, idx: i });
    });
    return acc;
  }, []);

  // Render side rail externally
  useEffect(() => {
    const navEl = document.getElementById('navItems');
    if (!navEl) return;
    navEl.innerHTML = '';
    let i = 0;
    Object.entries(groups).forEach(([gname, items]) => {
      const sec = document.createElement('div');
      sec.className = 'nav-section';
      sec.textContent = gname;
      navEl.appendChild(sec);
      items.forEach(it => {
        i++;
        const row = document.createElement('div');
        row.className = 'nav-item' + (it.id === screen ? ' active' : '');
        row.innerHTML = `<span class="nav-num">${String(i).padStart(2, '0')}</span><span class="nav-label">${it.label}</span>`;
        row.onclick = () => go(it.id);
        navEl.appendChild(row);
      });
    });
  }, [screen, groups]);

  // Update meta
  const cur = SCREENS.find(s => s.id === screen) || SCREENS[0];
  const curIdx = SCREENS.findIndex(s => s.id === screen) + 1;
  useEffect(() => {
    const c = document.getElementById('crumb');
    const m = document.getElementById('metaTag');
    const cnt = document.getElementById('counter');
    const desc = document.getElementById('desc');
    if (c) c.innerHTML = (cur.desc.t || cur.label).replace('.', '<em>.</em>');
    if (m) m.innerHTML = `○ flow · android · 412×892`;
    if (cnt) cnt.textContent = `screen ${String(curIdx).padStart(2, '0')} / ${String(SCREENS.length).padStart(2, '0')}`;
    if (desc && tweaks.showAnnotations) {
      desc.style.display = 'block';
      desc.innerHTML = `
        <h3>${cur.desc.t}${cur.desc.em ? ' <em>' + cur.desc.em + '</em>' : ''}</h3>
        <p>${cur.desc.body}</p>
      `;
    } else if (desc) {
      desc.style.display = 'none';
    }
  }, [screen, tweaks.showAnnotations]);

  // Resolve screen component
  const screenEl = renderScreen(screen, go);

  // Bottom nav active state mapping
  const navMap = {
    home: 'home', ideas: 'home', 'idea-detail': 'home',
    discover: 'discover', 'channel-deep': 'discover', 'video-deep': 'discover',
    scripts: 'board', 'script-edit': 'board', episodes: 'board', 'episode-detail': 'board', proposals: 'board',
    'audio-create': 'audio',
    more: 'more', settings: 'more', endpoints: 'more', resources: 'more', jobs: 'more', login: 'more',
  };
  const activeNav = navMap[screen] || 'home';
  const showNav = tweaks.showBottomNav && screen !== 'login';

  return (
    <React.Fragment>
      <div data-screen-label={`${String(curIdx).padStart(2,'0')} ${cur.label}`} style={{
        display: 'flex', flexDirection: 'column', flex: 1, minHeight: 0,
        background: T.surface950, color: T.ink,
      }}>
        <div className="screen-body">
          {screenEl}
        </div>
        {showNav && (
          <BottomNav active={activeNav} onChange={(n) => {
            const target = { home: 'home', discover: 'discover', board: 'episodes', audio: 'audio-create', more: 'more' }[n];
            if (target) go(target);
          }} />
        )}
      </div>

      <TweaksPanel tweaks={tweaks} setTweak={setTweak}>
        <TweakSection label="Tour">
          <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
            {SCREENS.map((s, i) => (
              <button key={s.id} onClick={() => go(s.id)} style={{
                textAlign: 'left', padding: '6px 8px', borderRadius: 4,
                background: s.id === screen ? 'rgba(13,148,136,0.16)' : 'transparent',
                border: '1px solid ' + (s.id === screen ? 'rgba(13,148,136,0.4)' : 'transparent'),
                color: s.id === screen ? '#5eead4' : '#b8c0bc',
                fontFamily: '"Inter Tight", sans-serif', fontSize: 12, cursor: 'pointer',
                display: 'flex', gap: 8,
              }}>
                <span style={{ fontFamily: '"JetBrains Mono", monospace', color: '#525c57', width: 18 }}>
                  {String(i + 1).padStart(2, '0')}
                </span>
                <span>{s.label}</span>
              </button>
            ))}
          </div>
        </TweakSection>

        <TweakSection label="Display">
          <TweakToggle
            label="Show annotations"
            value={tweaks.showAnnotations}
            onChange={v => setTweak('showAnnotations', v)}
          />
          <TweakToggle
            label="Show bottom nav"
            value={tweaks.showBottomNav}
            onChange={v => setTweak('showBottomNav', v)}
          />
        </TweakSection>
      </TweaksPanel>
    </React.Fragment>
  );
}

function getHashScreen() {
  const h = window.location.hash.replace('#', '');
  return SCREENS.find(s => s.id === h) ? h : null;
}

function renderScreen(id, go) {
  switch (id) {
    case 'login':         return <LoginScreen go={go} />;
    case 'home':          return <HomeScreen go={go} />;
    case 'discover':      return <DiscoverScreen go={go} />;
    case 'channel-deep':  return <ChannelDeepScreen go={go} onBack={() => go('discover')} />;
    case 'video-deep':    return <VideoDeepScreen go={go} onBack={() => go('discover')} />;
    case 'ideas':         return <IdeasScreen go={go} />;
    case 'idea-detail':   return <IdeaFocusScreen idea={{
      id: 1, type: 'long', title: 'Why otters hold hands while sleeping',
      hook: 'They don\'t want to drift apart in the night.',
      source: 'ai', model: 'gemini 2.5 pro', age: '12m',
      tags: ['biology', 'behavior', 'kelp'],
    }} onBack={() => go('ideas')} go={go} />;
    case 'scripts':       return <ScriptsScreen go={go} />;
    case 'script-edit':   return <ScriptEditScreen go={go} onBack={() => go('scripts')} />;
    case 'episodes':      return <EpisodesScreen go={go} />;
    case 'episode-detail':return <EpisodeDetailScreen go={go} onBack={() => go('episodes')} />;
    case 'audio-create':  return <AudioScreen go={go} />;
    case 'resources':     return <ResourcesScreen go={go} />;
    case 'proposals':     return <ProposalsScreen go={go} />;
    case 'jobs':          return <JobsScreen go={go} />;
    case 'more':          return <MoreScreen go={go} />;
    case 'settings':      return <SettingsScreen go={go} />;
    case 'endpoints':     return <EndpointsScreen go={go} />;
    default:              return <HomeScreen go={go} />;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
